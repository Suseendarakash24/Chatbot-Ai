<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12151A;
    --surface:#1B1F26;
    --surface-2:#22262E;
    --border:#2A2F38;
    --text:#EDEDEA;
    --text-dim:#8A8F98;
    --accent:#C9A24B;
    --accent-dim:#8A7639;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }

  header{
    padding:22px 28px 18px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:baseline;
    gap:10px;
    flex-shrink:0;
  }
  header h1{
    font-family:'Newsreader',serif;
    font-style:italic;
    font-weight:500;
    font-size:22px;
    margin:0;
    letter-spacing:0.2px;
  }
  header .status{
    font-size:12px;
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:6px;
  }
  header .status::before{
    content:"";
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--accent);
    display:inline-block;
  }

  .chat-area{
    flex:1;
    overflow-y:auto;
    padding:28px 0 16px;
    display:flex;
    justify-content:center;
  }
  .chat-inner{
    width:100%;
    max-width:680px;
    padding:0 24px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .empty-state{
    margin:auto;
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    max-width:320px;
  }
  .empty-state span{
    display:block;
    font-family:'Newsreader',serif;
    font-style:italic;
    color:var(--text);
    font-size:19px;
    margin-bottom:6px;
  }

  .row{
    display:flex;
    animation:rise 0.25s ease;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(4px);}
    to{opacity:1; transform:translateY(0);}
  }
  .row.user{justify-content:flex-end;}
  .row.bot{justify-content:flex-start;}

  .bubble{
    max-width:78%;
    padding:12px 16px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .row.user .bubble{
    background:var(--accent);
    color:#171310;
    border-bottom-right-radius:4px;
  }
  .row.bot .bubble{
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    border-bottom-left-radius:4px;
  }

  .thinking .bubble{
    display:flex;
    align-items:center;
    gap:5px;
    padding:14px 18px;
  }
  .thinking .dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--accent-dim);
    animation:pulse 1.1s ease-in-out infinite;
  }
  .thinking .dot:nth-child(2){animation-delay:0.15s;}
  .thinking .dot:nth-child(3){animation-delay:0.3s;}
  @keyframes pulse{
    0%,80%,100%{opacity:0.25; transform:scale(0.85);}
    40%{opacity:1; transform:scale(1);}
  }

  .input-bar{
    flex-shrink:0;
    display:flex;
    justify-content:center;
    padding:16px 24px 22px;
    border-top:1px solid var(--border);
    background:var(--bg);
  }
  form{
    width:100%;
    max-width:680px;
    display:flex;
    align-items:flex-end;
    gap:10px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:8px 8px 8px 16px;
  }
  textarea{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    resize:none;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    line-height:1.4;
    max-height:120px;
    padding:8px 0;
  }
  textarea::placeholder{color:var(--text-dim);}

  button{
    background:var(--accent);
    border:none;
    width:36px;
    height:36px;
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:opacity 0.15s ease;
  }
  button:hover{opacity:0.88;}
  button:disabled{opacity:0.4; cursor:not-allowed;}
  button svg{width:16px; height:16px;}

  .chat-area::-webkit-scrollbar{width:8px;}
  .chat-area::-webkit-scrollbar-thumb{background:var(--surface-2); border-radius:8px;}
</style>
</head>
<body>

  <header>
    <h1>Chat</h1>
    <span class="status">online</span>
  </header>

  <div class="chat-area">
    <div class="chat-inner" id="chatInner">
      <div class="empty-state" id="emptyState">
        <span>Start a conversation</span>
        Ask anything — answers appear right below.
      </div>
    </div>
  </div>

  <div class="input-bar">
    <form id="chatForm" onsubmit="return false;">
      <textarea name="message" id="messageInput" placeholder="Message..." rows="1" autocomplete="off" autofocus></textarea>
      <button type="submit" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="#171310" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="6 11 12 5 18 11"></polyline>
        </svg>
      </button>
    </form>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script>
    const chatInner = document.getElementById('chatInner');
    const emptyState = document.getElementById('emptyState');
    const messageInput = document.getElementById('messageInput');
    const chatArea = document.querySelector('.chat-area');
    const sendBtn = document.getElementById('sendBtn');

    function autoGrow(el){
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
    messageInput.addEventListener('input', () => autoGrow(messageInput));

    function scrollToBottom(){
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addMessage(text, sender){
      if(emptyState) emptyState.remove();
      const row = document.createElement('div');
      row.className = 'row ' + sender;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      row.appendChild(bubble);
      chatInner.appendChild(row);
      scrollToBottom();
      return row;
    }

    function addThinking(){
      const row = document.createElement('div');
      row.className = 'row bot thinking';
      row.innerHTML = '<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      chatInner.appendChild(row);
      scrollToBottom();
      return row;
    }

    function toggleInput(disabled){
      messageInput.disabled = disabled;
      sendBtn.disabled = disabled;
    }

    document.getElementById('chatForm').addEventListener('submit', function(){
      const text = messageInput.value.trim();
      if(!text) return;

      addMessage(text, 'user');
      messageInput.value = '';
      autoGrow(messageInput);
      toggleInput(true);

      const thinkingRow = addThinking();

      $.post('/chat', { prompt: text }, function(response){
        thinkingRow.remove();
        if(response.startsWith('Error:')){
          addMessage('Something went wrong. Please try again.', 'bot');
        } else {
          addMessage(response, 'bot');
        }
        toggleInput(false);
        messageInput.focus();
      }).fail(function(){
        thinkingRow.remove();
        addMessage('Something went wrong. Please try again.', 'bot');
        toggleInput(false);
      });
    });

    messageInput.addEventListener('keydown', function(e){
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        document.getElementById('chatForm').dispatchEvent(new Event('submit'));
      }
    });
  </script>
</body>
</html>
